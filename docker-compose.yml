version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cvht-postgres
    environment:
      POSTGRES_USER: cvht
      POSTGRES_PASSWORD: cvht123
      POSTGRES_DB: cvht_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
